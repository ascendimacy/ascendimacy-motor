# INVENTARIO.yaml — Inventário Esqueleto dos Playbooks do eBrota Kids
# Destino: ascendimacy-ops/docs/specs/yaml-examples/ebrota-inventario-v1.yaml
# Versão: 1-preview — 23 de abril de 2026
# Escopo v1-preview: estrutura completa + playbooks fundacionais por fase
#
# NOTA DE VERSÃO:
# Esta é a versão 1-preview do inventário. Contém:
#   - meta bloco completo (57 playbooks catalogados)
#   - playbooks fundacionais (primeiros de cada fase) com especificação completa
#   - listagem compacta (id + nome + fase + criticidade) dos 47 playbooks restantes
#
# A versão v1-full (57 playbooks todos com especificação completa) foi gerada
# em sessão 23 abr 2026 e será commitada em PRs sucessivos, um por fase, para
# manter histórico de diff granular. Tracker: umbrella issue desta sessão.
#
# Este inventário é documento-fonte operacional secundário do motor de validação.
# Fontes primárias complementares:
#   - livro eBrota Toolkit (12 partes + anexos) — book de processo canônico
#   - adquirente-jun.md — persona arquetípica v1 para fill-the-cap
#
# Formato de cada entrada:
#   id — identificador hierárquico com ponto (fase.subfase.playbook)
#   nome — nome humano
#   trigger — o que ativa
#   nivel_operacional — 1 (estético) / 2 (funcional) / 3 (ético) / 4 (existencial)
#   criticidade — seguranca | operacional-core | periferico
#   camadas_consultadas — lista de camadas da persona/morais aplicáveis
#   dependencias_upstream — playbooks que precisam ter rodado antes
#   dependencias_downstream — playbooks que este ativa
#   fonte_canonica — livro (capítulo) + arquivos do repositório
#   status — esqueleto | especificado | implementado | testado
#   especificacao.completa — true | false
#   especificacao.aspectos_especificados — o que o livro/fontes já cobrem
#   especificacao.aspectos_em_omissao — o que o motor precisa inferir
#   fill_the_cap_via — qual persona/camada usar para inferir
#   notas — comentário livre

meta:
  versao: 1-preview
  data: 2026-04-23
  autor: Jun Ochiai + Claude Opus 4.7
  escopo: fluxo-ponta-a-ponta-minimo
  total_entradas: 57
  total_neste_arquivo_preview: 10
  restantes_para_pr_sucessivos: 47
  cobertura_livro: Cap. 7 a Cap. 64 (parcial, criticos + operacional-core)
  fases:
    - fase_1_pre_onboarding:
        total: 12
        detalhados_neste_preview: 4
    - fase_2_triagem:
        total: 10
        detalhados_neste_preview: 1
    - fase_3_operacao_regular:
        total: 13
        detalhados_neste_preview: 1
    - fase_4_helix_ciclo_18d:
        total: 4
        detalhados_neste_preview: 1
    - fase_5_acolhimento:
        total: 3
        detalhados_neste_preview: 1
    - fase_6_cohort_digest:
        total: 5
        detalhados_neste_preview: 1
    - fase_7_crise:
        total: 6
        detalhados_neste_preview: 1
    - fase_8_terminal_revisao:
        total: 4
        detalhados_neste_preview: 0
  pendencias_explicitas:
    - inventario_exaustivo_v2  # expansao para ~200-400 playbooks
    - motor_execucao_playbooks  # especificacao tecnica (v1 feito, ver 2026-04-23-motor-execucao-v1.md)
    - motor_sts  # especificacao tecnica (pendente)
    - motor_drota  # especificacao tecnica (v1 feito, ver 2026-04-23-motor-drota-v1.md)
    - planejador  # especificacao tecnica (pendente)
    - book_processo_formal  # declaracao de que o livro eBrota Toolkit serve este papel
    - expansao_playbooks_restantes  # 47 playbooks em PRs por fase


# =====================================================================
# FASE 1 — PRÉ-ONBOARDING (Parte II do livro) — 12 playbooks no total
# =====================================================================

playbooks:

  - id: pre_onboarding.mapa_circulo.definir
    nome: Definir o mapa do círculo de cuidado
    trigger: adquirente primário manifesta intenção de iniciar piloto
    nivel_operacional: 3
    criticidade: seguranca
    camadas_consultadas:
      - moral/universal_humano
      - moral/parental
      - moral/cultural_br
      - persona-jun
    dependencias_upstream: []
    dependencias_downstream:
      - pre_onboarding.autorizacoes.consent_whatsapp_kids
      - pre_onboarding.kit.preparar
    fonte_canonica:
      - livro/Cap.7
      - PLAYBOOK-COMITE-PARENTAL.MD §1
      - COMITE-CONCEITO.MD §4-5
      - POLITICAS-DE-OPERACAO.MD §7
    status: esqueleto
    especificacao:
      completa: false
      aspectos_especificados:
        - cinco_papeis_possiveis
        - regras_de_obrigatoriedade
        - niveis_acesso_ao_digest
        - template_de_mapeamento
      aspectos_em_omissao:
        - protocolo_quando_adquirente_resiste_a_nomear_operador_substituto
        - protocolo_quando_profissional_de_escopo_recusa_declaracao_formal
        - comportamento_quando_familiar_periferico_pede_acesso_maior
      fill_the_cap_via: persona-jun
    notas: >
      Este playbook é crítico porque produz o "vetor estrutural" de todo
      o círculo. Se o mapa é mal definido aqui, todos os playbooks
      downstream operam sobre fundação fraca.

  - id: pre_onboarding.escopo.explicar_o_que_engine_nao_faz
    nome: Explicar o que o engine NÃO faz
    trigger: durante leitura do Cap. 1 + Cap. 9 pelo adquirente
    nivel_operacional: 3
    criticidade: seguranca
    camadas_consultadas:
      - moral/universal_humano
      - moral/parental
    dependencias_upstream:
      - pre_onboarding.facilitador.apresentar_7_regras
    dependencias_downstream:
      - pre_onboarding.autorizacoes.consent_whatsapp_kids
    fonte_canonica:
      - livro/Cap.9
      - POLITICAS-DE-OPERACAO.MD §10
    status: esqueleto
    especificacao:
      completa: true
      aspectos_especificados:
        - lista_dura_6_coisas_que_nao_faz
        - protocolo_redirecionamento_em_4_passos
        - template_resposta_padrao_a_pedido_diagnostico
      aspectos_em_omissao:
        - comportamento_quando_adquirente_insiste_apos_redirecionamento_3x
      fill_the_cap_via: persona-jun
    notas: null

  - id: pre_onboarding.autorizacoes.consent_whatsapp_kids
    nome: Coletar consent WhatsApp Kids dos responsáveis legais
    trigger: adquirente confirma intenção de iniciar e mapa está pronto
    nivel_operacional: 3
    criticidade: seguranca
    camadas_consultadas:
      - moral/universal_humano
      - moral/parental
      - moral/cultural_br
    dependencias_upstream:
      - pre_onboarding.mapa_circulo.definir
      - pre_onboarding.escopo.explicar_o_que_engine_nao_faz
    dependencias_downstream:
      - pre_onboarding.autorizacoes.registrar_event_log
      - pre_onboarding.ok_de_comecar.conversa_estruturada
    fonte_canonica:
      - livro/Cap.10
      - juridico/CONSENT-WHATSAPP-EBROTA-KIDS.MD
      - POLITICAS-DE-OPERACAO.MD §1
    status: esqueleto
    especificacao:
      completa: true
      aspectos_especificados:
        - templates_PT_BR_e_JP
        - passo_a_passo_8_etapas
        - canais_revogacao
      aspectos_em_omissao:
        - protocolo_quando_1_responsavel_aprova_e_outro_demora_72h
        - protocolo_quando_consent_chega_em_formato_ambiguo_ex_thumbs_up_emoji
      fill_the_cap_via: moral/parental + persona-jun
    notas: >
      Playbook NÃO avança sem 100% dos consents explícitos. Em caso de
      qualquer ambiguidade, volta à fase "aguardando".

  - id: pre_onboarding.ok_de_comecar.gerar_baseline_casel
    nome: Gerar baseline CASEL da criança a partir das respostas
    trigger: 3 perguntas do "ok de começar" respondidas
    nivel_operacional: 2
    criticidade: operacional-core
    camadas_consultadas: []
    dependencias_upstream:
      - pre_onboarding.ok_de_comecar.conversa_estruturada
    dependencias_downstream:
      - pre_onboarding.ok_de_comecar.gerar_starter_deck
      - triagem.dia_1.icebreaker_2_verdades
    fonte_canonica:
      - CLAUDE_6.MD §4.5
      - livro/Cap.18
    status: esqueleto
    especificacao:
      completa: true
      aspectos_especificados:
        - algoritmo_baseline_por_serie
        - aplicacao_modifiers
      aspectos_em_omissao:
        - protocolo_quando_adquirente_informa_serie_inconsistente_com_idade
        - protocolo_quando_modifier_nao_esta_catalogado
      fill_the_cap_via: motor_execucao_playbooks + persona-jun
    notas: null


