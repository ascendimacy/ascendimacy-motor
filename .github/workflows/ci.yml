name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build shared
        run: npm run build -w shared

      - name: Run tests
        run: npm test

      - name: Build all
        run: npm run build

      - name: Smoke test
        env:
          USE_MOCK_LLM: "true"
        run: npm run smoke
